<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>glean — 옵션</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      max-width: 480px; margin: 32px auto; padding: 0 20px; color: #111;
    }
    h1 { font-size: 18px; margin-bottom: 4px; }
    p.hint { color: #666; font-size: 13px; margin-top: 4px; }
    label { display: block; font-size: 13px; margin: 20px 0 6px; font-weight: 600; }
    input[type=text] {
      width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 13px; box-sizing: border-box; font-family: inherit;
    }
    input[type=text]:focus { outline: 2px solid #0f766e; outline-offset: -1px; border-color: #0f766e; }
    button {
      margin-top: 14px; background: #0f766e; color: white; border: 0; padding: 8px 18px;
      border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
    }
    button:hover { background: #0d5d56; }
    .status { margin-top: 14px; font-size: 12px; min-height: 16px; }
    .ok { color: #0f766e; }
    .err { color: #b91c1c; }
    code { background: #f3f4f6; padding: 1px 5px; border-radius: 3px; font-size: 12px; font-family: 'SF Mono', Consolas, monospace; }
    .shortcut-info { margin-top: 24px; padding: 12px; background: #f9fafb; border-radius: 6px; font-size: 12px; color: #555; }
    .shortcut-info kbd {
      background: #fff; border: 1px solid #d1d5db; border-bottom-width: 2px;
      border-radius: 3px; padding: 1px 5px; font-family: 'SF Mono', Consolas, monospace; font-size: 11px;
    }
    a { color: #0f766e; }
  </style>
</head>
<body>
  <h1>glean 옵션</h1>
  <p class="hint">백엔드 서버 주소를 설정합니다. 기본값: <code>http://localhost:3001</code></p>

  <label for="url">백엔드 URL</label>
  <input type="text" id="url" placeholder="http://localhost:3001" autocomplete="off" />
  <button id="save">저장</button>
  <div id="status" class="status"></div>

  <div class="shortcut-info">
    <strong>사용법</strong><br/>
    · 우클릭 메뉴: <em>이 페이지 glean에 저장</em><br/>
    · 단축키: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>G</kbd> (Mac: <kbd>⌘</kbd>+<kbd>Shift</kbd>+<kbd>G</kbd>)<br/>
    · 단축키 변경: <code>chrome://extensions/shortcuts</code>
  </div>

  <script src="options.js"></script>
</body>
</html>
